<html lang="en">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg2:#f5f5f3; --bg3:#eeece8;
  --text:#1a1a18; --text2:#6b6b67; --text3:#9a9a96;
  --border:rgba(0,0,0,0.10); --border2:rgba(0,0,0,0.18);
  --radius:10px; --radius-sm:6px;
  --blue:#378ADD; --green:#1D9E75; --red:#E24B4A;
  --amber:#BA7517; --purple:#7F77DD; --gray:#888780; --coral:#D85A30;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a; --bg2:#252523; --bg3:#2e2e2b;
    --text:#f0ede8; --text2:#9a9a96; --text3:#6b6b67;
    --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
    --shadow:0 1px 3px rgba(0,0,0,0.3);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{max-width:900px;margin:0 auto;padding:0 0 80px;}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.save-badge{font-size:11px;color:var(--green);transition:opacity .3s;}
.content{padding:14px;}
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:var(--radius);padding:4px;margin-bottom:14px;}
.tab{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);font-weight:400;transition:background .15s,color .15s;font-family:inherit;}
.tab.active{background:var(--bg);color:var(--text);font-weight:500;box-shadow:var(--shadow);}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:12px;}
@media(min-width:480px){.metric-grid{grid-template-columns:repeat(4,1fr);}}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 13px;}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:2px;}
.metric-value{font-size:18px;font-weight:600;}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.goal-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.goal-track{background:var(--bg2);border-radius:6px;height:10px;overflow:hidden;}
.goal-fill{height:100%;border-radius:6px;background:var(--blue);transition:width .5s;}
.goal-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px;}
.alloc-track{display:flex;height:8px;border-radius:5px;overflow:hidden;margin-bottom:11px;}
.alloc-seg{height:100%;transition:width .4s;}
.alloc-legend{display:flex;flex-wrap:wrap;gap:7px 13px;}
.alloc-item{display:flex;align-items:center;gap:5px;font-size:12px;}
.alloc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
button{font-family:inherit;cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:7px 12px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);transition:background .12s;white-space:nowrap;}
.btn:hover{background:var(--bg2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent;}
.btn-primary:hover{opacity:.88;}
.btn-danger{color:#a32d2d;border-color:rgba(162,45,45,.25);}
.btn-sm{padding:4px 9px;font-size:12px;}
.btn-block{width:100%;justify-content:center;padding:10px;margin-top:6px;}
.btn-refresh{color:#1a5fa8;border-color:rgba(55,138,221,.35);background:rgba(55,138,221,.09);font-weight:500;}
/* ── section headers ── */
.section-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 6px;}
.section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.section-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;flex:1;}
.section-total{font-size:12px;color:var(--text2);font-weight:500;}
/* ── stock table ── */
.stock-table{width:100%;border-collapse:collapse;}
.stock-table th{font-size:11px;font-weight:500;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--border);white-space:nowrap;}
.stock-table th:hover{background:var(--bg2);}
.stock-table th span{transition:color .15s;}
.stock-table th.num,.stock-table td.num{text-align:right;}
.stock-table td{font-size:13px;padding:8px 8px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle;}
.stock-table tr:last-child td{border-bottom:none;}
.stock-table tr:hover td{background:var(--bg2);}
.ticker-cell{font-family:monospace;font-size:12px;font-weight:600;color:var(--blue);}
.company-cell{color:var(--text2);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.price-cell{font-weight:500;}
.value-cell{font-weight:600;}
.change-pos{color:var(--green);}
.change-neg{color:var(--red);}
.price-stale{color:var(--text3);font-style:italic;}
.price-loading{color:var(--text3);}
@media(max-width:500px){
  .hide-mobile{display:none;}
}
/* ── asset rows (non-stock) ── */
.asset-row{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;display:flex;align-items:center;gap:10px;margin-bottom:5px;box-shadow:var(--shadow);}
.asset-name{flex:1;font-size:13px;font-weight:500;}
.asset-value{font-size:14px;font-weight:600;min-width:80px;text-align:right;}
.liab-badge{font-size:10px;background:#FCEBEB;color:#791F1F;padding:1px 6px;border-radius:10px;margin-top:2px;display:inline-block;}
/* ── history ── */
.snap-row{padding:10px 0;border-bottom:0.5px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.snap-row:last-child{border-bottom:none;}
.snap-stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:3px;}
.snap-stat{font-size:12px;color:var(--text2);}
.snap-stat strong{color:var(--text);}
/* ── modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px;}
.modal{background:var(--bg);border-radius:var(--radius);padding:18px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.modal h2{font-size:15px;font-weight:600;margin-bottom:14px;}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px;}
input[type=text],input[type=number],select,textarea{width:100%;padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);margin-bottom:10px;outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--blue);}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:14px;cursor:pointer;}
.checkbox-row input{width:auto;margin:0;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
/* ── search results ── */
.search-results{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-sm);margin-top:-8px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.search-item{padding:9px 11px;cursor:pointer;border-bottom:0.5px solid var(--border);font-size:13px;transition:background .1s;}
.search-item:last-child{border-bottom:none;}
.search-item:hover{background:var(--bg2);}
.search-ticker{font-family:monospace;font-weight:600;color:var(--blue);margin-right:8px;}
.search-name{color:var(--text2);font-size:12px;}
.search-exch{font-size:10px;color:var(--text3);margin-left:6px;}
/* ── status ── */
.status-bar{font-size:11px;color:var(--text3);padding:5px 0;display:flex;align-items:center;gap:6px;}
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* ── chart ── */
.chart-wrap{width:100%;overflow:hidden;}
svg text{font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
.tools-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.empty{text-align:center;padding:2rem 0;color:var(--text2);font-size:13px;}
.snap-form{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid rgba(55,138,221,.4);}
.snap-preview{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.7;}
.tab-content{display:none;} .tab-content.active{display:block;}
.portfolio-summary{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;display:flex;flex-wrap:wrap;gap:10px 20px;}
.port-stat{font-size:12px;color:var(--text2);}
.port-stat strong{color:var(--text);font-weight:600;}
</style>
</head>

      <div class="topbar-title">Net Worth Tracker</div>

    </div>
    <div class="topbar-actions">
      <span class="save-badge" id="saveBadge" style="opacity:0">Saved ✓</span>

<script>
// ════════════════════════════════════════════════════════════════════
// DATA STRUCTURES
// ════════════════════════════════════════════════════════════════════
const CAT_COLOR = {Cash:'#1D9E75',Investments:'#378ADD',CPF:'#7F77DD',Property:'#BA7517',Insurance:'#D85A30',Other:'#888780',Stocks:'#378ADD'};
const CATEGORIES = ['Cash','CPF','Property','Insurance','Other'];
const CURRENT_YEAR = new Date().getFullYear();

// Retirement goal settings — all user-editable
let goalSettings = {
  monthlyIncome: 10000,   // SGD/month desired in retirement
  yearsToRetire: 10,      // years from now
  annualReturn:  5.0,     // % p.a. investment return
  swr:           4.0,     // % safe withdrawal rate
};

// Derived goal values (recomputed whenever settings change)
function computeGoal(){
  const nestEgg = (goalSettings.monthlyIncome * 12) / (goalSettings.swr / 100);
  const retireYear = CURRENT_YEAR + goalSettings.yearsToRetire;
  return { nestEgg, retireYear };
}

// ── Two-stream retirement projection ─────────────────────────────────
// Investable assets (stocks + cash) grow at annualReturn %.
// Locked assets grow at their own slower fixed rates:
//   CPF OA: 2.5%, CPF SA: 4%, Property: 2% nominal, Insurance: 1.5%
// This gives a far more realistic picture than applying one rate to total nav.

function computeAssetStreams(){
  const t = computeTotals();
  let cpf=0, propSG=0, propTH=0, insur=0;
  assets.forEach(a=>{
    if(a.isLiability) return;
    const v = getAssetValueSGD(a);
    const cat = a.category;
    const name = (a.name||'').toLowerCase();
    if(cat==='CPF') cpf += v;
    else if(cat==='Property'){
      if(a.origCurrency==='THB'||name.includes('lpn')||name.includes('klong')) propTH+=v;
      else propSG+=v;
    }
    else if(cat==='Insurance') insur+=v;
  });
  const investable = t.stockValSGD + (t.nav - t.stockValSGD - cpf - propSG - propTH - insur - t.totalLiab > 0
    ? t.nav - t.stockValSGD - cpf - propSG - propTH - insur - t.totalLiab : 0);
  // Cash = nav minus stocks, CPF, property, insurance, liabilities
  const cash = Math.max(0, t.nav - t.stockValSGD - cpf - propSG - propTH - insur);
  return {
    investable: t.stockValSGD + cash,  // stocks + all cash — grows at annualReturn
    cpf,          // grows at ~3% blended (OA 2.5%, SA 4%)
    propSG,       // grows at ~2% nominal (Singapore property long run)
    propTH,       // grows at ~1.5% nominal (Thai property, discounted for illiquidity)
    insur,        // grows at ~1.5% (fixed maturity schedule)
    liab: t.totalLiab,
    nav: t.nav,
  };
}

function projectStreams(years){
  const s = computeAssetStreams();
  const ri = goalSettings.annualReturn / 100;  // investable: user-set rate
  const rc = 0.03;   // CPF blended
  const rp = 0.02;   // Property SG
  const rt = 0.015;  // Property TH
  const rn = 0.015;  // Insurance
  const inv = s.investable * Math.pow(1+ri, years);
  const cpf = s.cpf     * Math.pow(1+rc, years);
  const psg = s.propSG  * Math.pow(1+rp, years);
  const pth = s.propTH  * Math.pow(1+rt, years);
  const ins = s.insur   * Math.pow(1+rn, years);
  return { inv, cpf, psg, pth, ins, liab: s.liab };
}

// Monthly savings needed — applied only to investable portion
function computeMonthlySavingsNeeded(nav){
  const {nestEgg} = computeGoal();
  const r = goalSettings.annualReturn / 100;
  const n = goalSettings.yearsToRetire;
  const s = computeAssetStreams();

  // Project each stream forward
  const proj = projectStreams(n);
  const projTotal = proj.inv + proj.cpf + proj.psg + proj.pth + proj.ins - proj.liab;
  const gap = Math.max(0, nestEgg - projTotal);
  if(gap <= 0) return 0;

  // Savings go into investable assets, so FV uses investable return rate
  const monthlyRate = r / 12;
  const months = n * 12;
  const growthFactor = Math.pow(1 + r, n);
  if(r < 0.0001) return gap / months;
  return gap * monthlyRate / (growthFactor - 1);
}

let usdSgdRate = 1.34;
let thbSgdRate = 1/22.4;
let eurSgdRate = 1.45; // ~SGD 1.45 per EUR (approximate, fetchable via live rate)

// Stock positions: {id, ticker, exchange ('US'|'SG'), companyName, currency, units, lastPrice, lastChange, lastUpdated}
let stocks = [];
// Other assets: {id, name, category, value, isLiability}
let assets = [];
// Snapshots: {date, totalAssets, totalLiab, nav, investable, note, stockValue}
let snapshots = [];

let currentTab = 'dashboard';
let modalType = 'stock';
let editStockId = null;
let editAssetId = null;

function fmtK(v,currency='SGD'){
  const a=Math.abs(v);
  const sym = currency==='USD'?'US$':'S$';
  if(a>=1_000_000) return (v<0?'-':'')+sym+(a/1_000_000).toFixed(2)+'M';
  if(a>=1_000) return (v<0?'-':'')+sym+Math.round(a/1_000)+'K';
  return (v<0?'-':'')+sym+Math.round(a).toLocaleString();
}
function fmtPrice(v,currency='USD'){
  const sym = currency==='USD' ? 'US$' : currency==='THB' ? '฿' : currency==='EUR' ? '€' : 'S$';
  return sym+(+v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtFull(v){return 'SGD '+Math.abs(Math.round(v)).toLocaleString();}
function todayStr(){return new Date().toISOString().slice(0,10);}
function tsAgo(iso){
  if(!iso) return 'never';
  const d=(Date.now()-new Date(iso).getTime())/60000;
  if(d<2) return 'just now';
  if(d<60) return Math.round(d)+'m ago';
  if(d<1440) return Math.round(d/60)+'h ago';
  return Math.round(d/1440)+'d ago';
}

function buildDataPayload(){
  return {
    version: 2,
    exportedAt: new Date().toISOString(),
    stocks, assets, snapshots,
    fxRates: { usdSgdRate, thbSgdRate, eurSgdRate },
    goalSettings,
  };
}

function applyDataPayload(d){
  if(d.stocks)   stocks    = d.stocks;
  if(d.assets)   assets    = d.assets;
  if(d.snapshots) snapshots = d.snapshots;
  if(d.fxRates){
    if(d.fxRates.usdSgdRate>0) usdSgdRate = d.fxRates.usdSgdRate;
    if(d.fxRates.thbSgdRate>0) thbSgdRate = d.fxRates.thbSgdRate;
    if(d.fxRates.eurSgdRate>0) eurSgdRate = d.fxRates.eurSgdRate;
  }
  if(d.goalSettings) Object.assign(goalSettings, d.goalSettings);
}

function saveAll(){
  try{
    // 1. Always write to localStorage (instant, same browser)
    const payload = buildDataPayload();
    localStorage.setItem('pf2_v2', JSON.stringify(payload));
    // Legacy keys so older versions still work
    localStorage.setItem('pf2_stocks', JSON.stringify(stocks));
    localStorage.setItem('pf2_assets', JSON.stringify(assets));
    localStorage.setItem('pf2_snaps',  JSON.stringify(snapshots));
    localStorage.setItem('pf2_fxrate', String(usdSgdRate));
    localStorage.setItem('pf2_thbrate',String(thbSgdRate));
    localStorage.setItem('pf2_eurrate',String(eurSgdRate));
    localStorage.setItem('pf2_goal',   JSON.stringify(goalSettings));
    localStorage.setItem('pf2_lastSave', new Date().toISOString());

    const b=document.getElementById('saveBadge');
    if(b){ b.style.opacity=1; setTimeout(()=>b.style.opacity=0,2000); }
  }catch(e){ console.error('saveAll error',e); }
}

// Export JSON file — call this to create the portable companion file
function exportData(silent=false){
  const payload = buildDataPayload();
  payload.exportedAt = new Date().toISOString();
  const data = JSON.stringify(payload, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'finance-data.json'; // fixed name so it replaces the previous one
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('pf2_lastExport', new Date().toISOString());
  if(!silent) updateBackupBanner();
}

// Import JSON file — loads a previously exported finance-data.json
function importData(){
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const d = JSON.parse(ev.target.result);
        applyDataPayload(d);
        normaliseStocks();
        mergeMissingSeedStocks();
        saveAll(); render();
        localStorage.setItem('pf2_lastExport', new Date().toISOString());
        updateBackupBanner();
        alert('✓ Data loaded from file. Your dashboard is now up to date.');
      }catch(e){ alert('Could not read file — make sure it is a finance-data.json exported from this dashboard.'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function loadAll(){
  try{
    // Try the unified v2 payload first
    const v2 = localStorage.getItem('pf2_v2');
    if(v2){
      const d = JSON.parse(v2);
      applyDataPayload(d);
    } else {
      // Fall back to legacy individual keys
      const s  = localStorage.getItem('pf2_stocks');
      const a  = localStorage.getItem('pf2_assets');
      const sn = localStorage.getItem('pf2_snaps');
      const fx = localStorage.getItem('pf2_fxrate');
      const thb= localStorage.getItem('pf2_thbrate');
      const eur= localStorage.getItem('pf2_eurrate');
      const gs = localStorage.getItem('pf2_goal');
      if(s)  stocks    = JSON.parse(s);   else stocks    = SEED_STOCKS;
      if(a)  assets    = JSON.parse(a);   else assets    = SEED_ASSETS;
      if(sn) snapshots = JSON.parse(sn);
      if(fx){ const v=parseFloat(fx);  if(v>0) usdSgdRate=v; }
      if(thb){ const v=parseFloat(thb); if(v>0) thbSgdRate=v; }
      if(eur){ const v=parseFloat(eur); if(v>0) eurSgdRate=v; }
      if(gs){ try{ Object.assign(goalSettings,JSON.parse(gs)); }catch(e){} }
    }
    normaliseStocks();
    mergeMissingSeedStocks();
  }catch(e){ stocks=SEED_STOCKS; assets=SEED_ASSETS; console.error('loadAll error',e); }
}

function normaliseStocks(){
  stocks = stocks.map(st => {
    const exch = String(st.exchange||'US').toUpperCase().trim();
    let u = {
      ...st,
      exchange: exch==='SG' ? 'SG' : exch==='TH' ? 'TH' : 'US'
    };
    if(!u.nameLocked && TICKER_NAME_LOCK[u.ticker]) u.companyName = TICKER_NAME_LOCK[u.ticker];
    return u;
  });
}

// ── Backup age banner ────────────────────────────────────────────────
function updateBackupBanner(){
  const banner = document.getElementById('backup-banner');
  if(!banner) return;
  const lastExport = localStorage.getItem('pf2_lastExport');
  if(!lastExport){ banner.style.display='flex'; banner.dataset.state='never'; _setBannerText(banner,'never'); return; }
  const ageHours = (Date.now() - new Date(lastExport).getTime()) / 3_600_000;
  if(ageHours > 24){ banner.style.display='flex'; banner.dataset.state='old'; _setBannerText(banner,'old',ageHours); }
  else { banner.style.display='none'; }
}
function _setBannerText(banner, state, ageHours){
  const msg = state==='never'
    ? '📂 Your data only exists in this browser. <strong>Export finance-data.json</strong> and keep it next to the HTML file so your iPhone and other devices stay in sync.'
    : `⚠ Last backup was ${Math.round(ageHours)}h ago. Export an updated <strong>finance-data.json</strong> to keep your devices in sync.`;
  banner.querySelector('#banner-msg').innerHTML = msg;
}

// ════════════════════════════════════════════════════════════════════
// PRICE FETCHING
// ════════════════════════════════════════════════════════════════════
// ── Multi-proxy fetch engine ─────────────────────────────────────────
// Rotates through proxies, retries failed tickers, adds jitter delay
// to avoid rate-limiting. Google Finance scraped as last-resort fallback.

// ── CORS Proxy list ───────────────────────────────────────────────────
// allorigins: works from any origin including file://, ~20 req/min
// corsproxy.io: works on github.io & localhost (not file://), 10K req/month
// codetabs: works most origins, 5 req/sec
// cors.x2u.in: 100 req/hour, good overflow
const PROXIES = [
  { fn: url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, origins: 'any' },
  { fn: url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,          origins: 'https' },
  { fn: url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, origins: 'any' },
  { fn: url => `https://cors.x2u.in/${encodeURIComponent(url)}`,                origins: 'https' },
];

// Detect if running from file:// — corsproxy.io and cors.x2u.in reject file:// origins
const IS_FILE_ORIGIN = location.protocol === 'file:';

// Filter to proxies that work in the current environment
function getAvailableProxies() {
  return PROXIES
    .filter(p => p.origins === 'any' || !IS_FILE_ORIGIN)
    .map(p => p.fn);
}

// ── Per-proxy health tracking ─────────────────────────────────────────
const _proxyHealth = PROXIES.map(() => ({ fails: 0, lastFail: 0 }));

function getHealthyProxies() {
  const now = Date.now();
  const available = getAvailableProxies();
  return available
    .map((fn, localIdx) => {
      // Map back to global index for health tracking
      const globalIdx = PROXIES.findIndex(p => p.fn === fn);
      return { fn, i: globalIdx, h: _proxyHealth[globalIdx] };
    })
    .filter(({ h }) => h.fails < 3 || (now - h.lastFail) > 60000)
    .sort((a, b) => a.h.fails - b.h.fails);
}

function markProxyFailed(i) {
  _proxyHealth[i].fails++;
  _proxyHealth[i].lastFail = Date.now();
}

function markProxyOk(i) {
  _proxyHealth[i].fails = Math.max(0, _proxyHealth[i].fails - 1);
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

function proxyWrap(proxyFn, yahooUrl, ms=6000) {
  const bust = `&_b=${Date.now()}`;
  const bustYahooUrl = yahooUrl + bust;
  const proxied = proxyFn(bustYahooUrl);
  return Promise.race([
    fetch(proxied),
    new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), ms))
  ]);
}

function proxyWrapSearch(proxyFn, yahooUrl, ms=6000) {
  const proxied = proxyFn(yahooUrl);
  const bustProxy = proxied + (proxied.includes('?') ? '&' : '?') + `_t=${Date.now()}`;
  return Promise.race([
    fetch(bustProxy),
    new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout')), ms))
  ]);
}

// ── Batch quote fetch — fetch up to 10 symbols in ONE request ─────────
// This is the key optimisation: 29 stocks → 3 batch requests instead of 29 individual ones
async function fetchQuoteBatch(symbols) {
  const fields = 'regularMarketPrice,regularMarketPreviousClose,postMarketPrice,longName,shortName,currency';
  const symbolStr = symbols.join(',');
  const healthyProxies = getHealthyProxies();

  for (const { fn, i } of healthyProxies) {
    for (const host of ['query1', 'query2']) {
      try {
        const yahooUrl = `https://${host}.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbolStr)}&fields=${fields}`;
        const r = await proxyWrap(fn, yahooUrl, 8000);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const text = await r.text();
        if (!text || text[0] === '<') throw new Error('Blocked');
        const d = JSON.parse(text);
        const results = d?.quoteResponse?.result;
        if (!results || results.length === 0) throw new Error('Empty');
        markProxyOk(i);
        const map = {};
        results.forEach(q => {
          if (q.regularMarketPrice) {
            const prev = q.regularMarketPreviousClose;
            map[q.symbol] = {
              price: q.postMarketPrice || q.regularMarketPrice,
              change: prev ? ((q.regularMarketPrice - prev) / prev * 100) : null,
              currency: q.currency || 'USD',
              longName: q.longName || q.shortName || q.symbol,
              source: 'Yahoo',
            };
          }
        });
        return map;
      } catch(e) {
        markProxyFailed(i);
      }
    }
  }
  return {};
}

function yahooSymbol(st) {
  if (st.exchange === 'SG') {
    const t = st.ticker.trim();
    if (t.endsWith('.SI')) return t;
    if (t === 'SET EUR') return 'SET.SI';
    return t + '.SI';
  }
  if (st.exchange === 'TH') {
    const t = st.ticker.trim();
    if (t.endsWith('.BK')) return t;
    return t + '.BK';
  }
  return st.ticker; // US stocks use ticker as-is
}

// Known ticker name overrides — for tickers where Yahoo returns wrong/abbreviated name via proxy
const TICKER_NAME_LOCK = {
  'BUOU': 'Frasers Logistics & Commercial Trust',
  'N2IU': 'Mapletree Pan Asia Commercial Trust',
};

// Try Yahoo v8 chart endpoint
async function tryYahooProxy(proxyFn, symbol) {
  const hosts = ['query1', 'query2'];
  let lastErr;
  for (const host of hosts) {
    try {
      const yahooUrl = `https://${host}.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=5d`;
      const r = await proxyWrap(proxyFn, yahooUrl, 5000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      if (!text || text[0] === '<') throw new Error('Blocked');
      const d = JSON.parse(text);
      const meta = d?.chart?.result?.[0]?.meta;
      if (!meta || !meta.regularMarketPrice) throw new Error('No price');
      const prev = meta.chartPreviousClose || meta.previousClose;
      return {
        price: meta.regularMarketPrice,
        change: prev ? ((meta.regularMarketPrice - prev) / prev * 100) : null,
        currency: meta.currency || 'USD',
        longName: meta.longName || meta.shortName || symbol,
        source: 'Yahoo',
      };
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

// Try Yahoo v7 quote endpoint — primary source, returns true current price
// including after-hours and pre-market when markets are closed
async function tryYahooV7(proxyFn, symbol) {
  const fields = 'regularMarketPrice,regularMarketPreviousClose,postMarketPrice,preMarketPrice,longName,shortName,currency,marketState';
  // Try both query1 and query2 — one may be rate-limited or blocked on mobile
  const hosts = ['query1', 'query2'];
  let lastErr;
  for (const host of hosts) {
    try {
      const yahooUrl = `https://${host}.finance.yahoo.com/v7/finance/quote?symbols=${symbol}&fields=${fields}`;
      const r = await proxyWrap(proxyFn, yahooUrl, 5000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      if (!text || text[0] === '<') throw new Error('Blocked');
      const d = JSON.parse(text);
      const q = d?.quoteResponse?.result?.[0];
      if (!q || !q.regularMarketPrice) throw new Error('No price');
      const prev = q.regularMarketPreviousClose;
      const livePrice = q.postMarketPrice || q.regularMarketPrice || q.preMarketPrice;
      const change = prev ? ((q.regularMarketPrice - prev) / prev * 100) : null;
      return {
        price: livePrice,
        change,
        currency: q.currency || 'USD',
        longName: q.longName || q.shortName || symbol,
        source: 'Yahoo',
      };
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

// Google Finance scrape fallback
async function tryGoogleFinance(st) {
  const exchanges = st.exchange === 'SG' ? ['SGX'] : ['NASDAQ','NYSE','NYSEARCA','NYSEMKT'];
  const proxyFn = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  for (const exch of exchanges) {
    try {
      const gUrl = `https://www.google.com/finance/quote/${encodeURIComponent(st.ticker)}:${exch}`;
      const r = await proxyWrap(proxyFn, gUrl, 7000);
      if (!r.ok) continue;
      const html = await r.text();
      const m = html.match(/class="YMlKec fxKbKc"[^>]*>([^<]+)</);
      if (!m) continue;
      const price = parseFloat(m[1].replace(/[^0-9.]/g, ''));
      if (!price) continue;
      const changeM = html.match(/([+-]?\d+\.?\d*)\s*\(([+-]?\d+\.?\d*)%\)/);
      const changePct = changeM ? parseFloat(changeM[2]) : null;
      const currM = html.match(/data-currency-code="([A-Z]{3})"/);
      const currency = currM ? currM[1] : (st.exchange === 'SG' ? 'SGD' : 'USD');
      return { price, change: changePct, currency, longName: st.companyName, source: 'Google' };
    } catch(e) { continue; }
  }
  throw new Error('Google also failed');
}

async function fetchQuote(st) {
  const symbol = yahooSymbol(st);
  for (const { fn, i } of getHealthyProxies()) {
    try { const q = await tryYahooV7(fn, symbol); markProxyOk(i); return q; } catch(e) { markProxyFailed(i); }
    try { const q = await tryYahooProxy(fn, symbol); markProxyOk(i); return q; } catch(e) {}
  }
  try { return await tryGoogleFinance(st); } catch(e) {}
  throw new Error('All sources failed for ' + st.ticker);
}

// Apply a fetched result back to the stocks array
function applyQuote(id, q) {
  const i = stocks.findIndex(x => x.id === id);
  if (i < 0) return;
  // Only update price fields if we got a real non-zero price
  // This preserves manual prices when auto-fetch fails
  if (q.price && q.price > 0) {
    stocks[i].lastPrice = q.price;
    stocks[i].lastChange = q.change;
    stocks[i].lastUpdated = new Date().toISOString();
    stocks[i].priceSource = q.source || 'Yahoo';
  }
  if (!stocks[i].nameLocked) {
    if (TICKER_NAME_LOCK[stocks[i].ticker]) {
      stocks[i].companyName = TICKER_NAME_LOCK[stocks[i].ticker];
    } else if (q.longName && q.longName !== stocks[i].ticker) {
      stocks[i].companyName = q.longName;
    }
  }
}

// Resolve company name for stocks where name still equals the ticker symbol.
// Uses Yahoo search — lightweight, works even when price fetch fails.
async function fetchNameOnly(st) {
  if (TICKER_NAME_LOCK[st.ticker]) return TICKER_NAME_LOCK[st.ticker];
  const symbol = yahooSymbol(st);
  try {
    for (const { fn } of getHealthyProxies()) {
      try {
        const q = await tryYahooV7(fn, symbol);
        if (q.longName && q.longName !== st.ticker) return q.longName;
      } catch(e) {}
    }
    const results = await searchYahoo(symbol);
    const match = results.find(r =>
      r.symbol === symbol || r.symbol === st.ticker ||
      r.symbol === st.ticker + '.SI' || r.symbol === st.ticker + '.BK'
    );
    if (match) return match.longname || match.shortname || null;
  } catch(e) {}
  return null;
}
async function refreshAllPrices(forceAll=false) {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.disabled = true; btn.textContent = '↻ Fetching…'; }

  const toFetch = (forceAll || stocks.every(s => s.lastPrice))
    ? [...stocks]
    : stocks.filter(s => !s.lastPrice || s.priceSource === 'Manual');

  // ── PHASE 1: Batch fetch — up to 10 symbols per request ──────────
  const BATCH_SIZE = 10;
  const failed = [];
  const batches = [];
  for (let i = 0; i < toFetch.length; i += BATCH_SIZE) {
    batches.push(toFetch.slice(i, i + BATCH_SIZE));
  }

  if (btn) btn.textContent = `↻ Batch 0/${batches.length}`;

  for (let bi = 0; bi < batches.length; bi++) {
    const batch = batches[bi];
    const symbols = batch.map(st => yahooSymbol(st));
    if (btn) btn.textContent = `↻ Batch ${bi+1}/${batches.length}`;

    const results = await fetchQuoteBatch(symbols);
    batch.forEach(st => {
      const q = results[yahooSymbol(st)];
      if (q) applyQuote(st.id, q);
      else if (!st.lastPrice || st.priceSource !== 'Manual') {
        // Only retry if no price yet, or if it's not a manual override
        // Don't retry manual prices just because batch didn't return them
        failed.push(st);
      }
    });

    render();
    if (bi < batches.length - 1) await sleep(300);
  }

  // ── PHASE 2: Individual retry — v8 chart then Google ─────────────
  // v8 chart API works for stocks that v7 returns empty for (common with SGX REITs)
  if (failed.length > 0) {
    if (btn) btn.textContent = `↻ Retrying ${failed.length} stock${failed.length>1?'s':''}…`;
    await sleep(500);

    for (const st of failed) {
      const symbol = yahooSymbol(st);
      let fetched = false;

      // Try v8 chart first for SGX (v7 often returns empty for SGX REITs)
      // Try v7 first for US stocks (more accurate price)
      const tryOrder = st.exchange === 'SG'
        ? ['v8', 'v7', 'google']
        : ['v7', 'v8', 'google'];

      for (const method of tryOrder) {
        if (fetched) break;
        for (const { fn, i } of getHealthyProxies()) {
          if (fetched) break;
          try {
            let q;
            if (method === 'v7') q = await tryYahooV7(fn, symbol);
            else if (method === 'v8') q = await tryYahooProxy(fn, symbol);
            else if (method === 'google') q = await tryGoogleFinance(st);
            if (q) { applyQuote(st.id, q); markProxyOk(i); fetched = true; }
          } catch(e) {
            if (method !== 'google') markProxyFailed(i);
          }
        }
        // Google doesn't need proxy loop
        if (method === 'google' && !fetched) {
          try {
            const q = await tryGoogleFinance(st);
            if (q) { applyQuote(st.id, q); fetched = true; }
          } catch(e) {}
          break;
        }
      }

      render();
      await sleep(200);
    }
  }

  saveAll(); render();
  const still = stocks.filter(s => !s.lastPrice).length;
  if (btn) {
    btn.disabled = false;
    btn.textContent = still > 0 ? `↻ Fetch ${still} missing` : '↻ Refresh prices';
  }

  // ── PHASE 3: Name resolution ──────────────────────────────────────
  const needsName = stocks.filter(s =>
    !s.nameLocked &&
    s.companyName === s.ticker &&
    !TICKER_NAME_LOCK[s.ticker]
  );
  if (needsName.length > 0) {
    for (const st of needsName) {
      const name = await fetchNameOnly(st);
      if (name) stocks = stocks.map(s => s.id === st.id ? {...s, companyName: name} : s);
      await sleep(200);
    }
    saveAll(); render();
  }
}

async function searchYahoo(query){
  const yahooUrl = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=8&newsCount=0&enableFuzzyQuery=true`;
  for (const { fn } of getHealthyProxies()) {
    try {
      const r = await proxyWrapSearch(fn, yahooUrl, 6000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      if (!text || text[0] === '<') throw new Error('Blocked');
      const d = JSON.parse(text);
      const results = (d?.quotes||[]).filter(q => {
        const qt = (q.quoteType||'').toUpperCase();
        return qt==='EQUITY'||qt==='ETF'||qt==='REIT'||qt==='TRUST'||
               qt.includes('EQUITY')||qt.includes('REIT')||qt.includes('TRUST');
      });
      return results.length ? results : (d?.quotes||[]).slice(0,6);
    } catch(e) { /* try next proxy */ }
  }
  return [];
}

// ════════════════════════════════════════════════════════════════════
// COMPUTED TOTALS
// ════════════════════════════════════════════════════════════════════
function getAssetValueSGD(a){
  if(!a.origCurrency || a.origCurrency==='SGD') return a.value;
  if(a.origCurrency==='THB') return Math.round(a.origValue * thbSgdRate);
  if(a.origCurrency==='USD') return Math.round(a.origValue * usdSgdRate);
  if(a.origCurrency==='EUR') return Math.round(a.origValue * eurSgdRate);
  return a.value;
}

function getStockValueSGD(st){
  if(!st.lastPrice) return null;
  let rate = 1;
  if(st.currency==='USD' || st.exchange==='US') rate = usdSgdRate;
  else if(st.currency==='EUR') rate = eurSgdRate;
  else if(st.currency==='THB' || st.exchange==='TH') rate = thbSgdRate;
  // SGD-priced SGX stocks: rate stays 1
  return st.lastPrice * st.units * rate;
}

function computeTotals(){
  const stockValSGD = stocks.reduce((s,st)=>{ const v=getStockValueSGD(st); return v?s+v:s; },0);
  const otherAssets = assets.filter(a=>!a.isLiability).reduce((s,a)=>s+getAssetValueSGD(a),0);
  const totalAssets = stockValSGD + otherAssets;
  const totalLiab   = assets.filter(a=>a.isLiability).reduce((s,a)=>s+getAssetValueSGD(a),0);
  const nav = totalAssets - totalLiab;
  const investable = stockValSGD + (assets.filter(a=>!a.isLiability&&a.category==='Cash').reduce((s,a)=>s+getAssetValueSGD(a),0));
  const hasAllPrices = stocks.every(s=>s.lastPrice!=null);
  return {stockValSGD, otherAssets, totalAssets, totalLiab, nav, investable, hasAllPrices};
}

async function searchTicker(){
  const raw=document.getElementById('f-ticker').value.trim();
  if(!raw) return;
  const exch=document.getElementById('f-exchange').value;
  // Pass the suffixed query so Yahoo finds the right exchange listing
  const query = exch==='SG' ? (raw.endsWith('.SI')?raw:raw+'.SI')
              : exch==='TH' ? (raw.endsWith('.BK')?raw:raw+'.BK')
              : raw;
  document.getElementById('search-results').innerHTML='<div style="font-size:12px;color:var(--text3);padding:6px 0">Searching…</div>';
  document.getElementById('stock-fetched').style.display='none';
  try{
    const results=await searchYahoo(query);
    if(!results.length){
      // Fallback: try without suffix in case Yahoo doesn't like it
      const fallback = await searchYahoo(raw);
      if(!fallback.length){
        document.getElementById('search-results').innerHTML='<div style="font-size:12px;color:var(--red);padding:6px 0">No results found. Try entering the full ticker (e.g. PTTEP, N2IU).</div>';
        return;
      }
      showSearchResults(fallback);
      return;
    }
    showSearchResults(results);
  }catch(e){
    document.getElementById('search-results').innerHTML='<div style="font-size:12px;color:var(--red);padding:6px 0">Search failed. Check connection.</div>';
  }
}

function showSearchResults(results){
  const html=results.slice(0,6).map(r=>`
    <div class="search-item" onclick="selectSearchResult('${r.symbol}','${(r.longname||r.shortname||r.symbol).replace(/'/g,"\\'")}','${r.exchange||''}')">
      <span class="search-ticker">${r.symbol}</span>
      <span class="search-name">${r.longname||r.shortname||''}</span>
      <span class="search-exch">${r.exchange||''}</span>
    </div>`).join('');
  document.getElementById('search-results').innerHTML=`<div class="search-results">${html}</div>`;
}

async function selectSearchResult(symbol, name, yahooExch){
  // Strip exchange suffix — Yahoo returns PTTEP.BK, N2IU.SI etc.
  // We store clean ticker; yahooSymbol() adds the suffix back when fetching
  const exchange = document.getElementById('f-exchange').value;
  const cleanTicker = symbol.replace(/\.(BK|SI|HK|L|AX|TO)$/i,'');
  document.getElementById('f-ticker').value = cleanTicker;
  document.getElementById('search-results').innerHTML='';
  const fetched=document.getElementById('stock-fetched');
  fetched.style.display='block';
  fetched.innerHTML='<span style="color:var(--text3)">Fetching price…</span>';
  fetchingTicker=cleanTicker;
  try{
    const currency = exchange==='SG'?'SGD' : exchange==='TH'?'THB' : 'USD';
    const tempSt={ticker:cleanTicker, exchange, companyName:name, currency};
    const q=await fetchQuote(tempSt);
    if(fetchingTicker!==cleanTicker) return; // user changed ticker during fetch
    const chg=q.change!=null?`<span style="color:${q.change>=0?'var(--green)':'var(--red)'};margin-left:8px">${q.change>=0?'+':''}${q.change.toFixed(2)}%</span>`:'';
    const src=q.source?`<span style="font-size:10px;color:var(--text3);margin-left:6px">via ${q.source}</span>`:'';
    fetched.innerHTML=`
      <div style="font-weight:600;margin-bottom:3px">${q.longName||name}</div>
      <div style="color:var(--text2);font-size:12px">${cleanTicker} · ${q.currency||currency}${src}</div>
      <div style="font-size:15px;font-weight:600;margin-top:6px">${fmtPrice(q.price,q.currency||currency)}${chg}</div>`;
  }catch(e){
    fetched.innerHTML=`<div style="color:var(--amber);font-size:12px">⚠ Could not fetch price for ${cleanTicker}. You can still add it — price will load on next refresh.</div>`;
  }
}

async function submitModal(){
  if(modalType==='stock'){
    const ticker=document.getElementById('f-ticker').value.trim().toUpperCase();
    const exchange=document.getElementById('f-exchange').value;
    const units=parseFloat(document.getElementById('f-units').value)||0;
    if(!ticker){ document.getElementById('f-ticker').focus(); return; }
    if(units<=0){ document.getElementById('f-units').focus(); return; }
    const btn=document.getElementById('submit-btn');
    btn.disabled=true; btn.textContent='Adding…';
    // Strip exchange suffixes if user typed them
    const cleanTicker = ticker.replace(/\.(BK|SI|HK|L|AX|TO)$/i,'');
    const currency = exchange==='SG' ? 'SGD' : exchange==='TH' ? 'THB' : 'USD';
    let price=null, change=null, longName=cleanTicker, resolvedCurrency=currency;
    try{
      const tempSt={ticker:cleanTicker, exchange, companyName:longName, currency};
      const q=await fetchQuote(tempSt);
      price=q.price; change=q.change; longName=q.longName||cleanTicker; resolvedCurrency=q.currency||currency;
    }catch(e){ console.warn('Price fetch on add failed:',e.message); }
    if(editStockId){
      // Editing existing stock
      stocks=stocks.map(s=>s.id===editStockId
        ?{...s,ticker:cleanTicker,exchange,companyName:longName,currency:resolvedCurrency,units,lastPrice:price,lastChange:change,lastUpdated:price?new Date().toISOString():s.lastUpdated}
        :s);
      editStockId=null;
    } else {
      stocks.push({id:uid(),ticker:cleanTicker,exchange,companyName:longName,currency:resolvedCurrency,units,lastPrice:price,lastChange:change,lastUpdated:price?new Date().toISOString():null,priceSource:price?'Yahoo':null});
    }
    btn.disabled=false; btn.textContent='Add';
    closeModal(); saveAll(); render();
  } else {
    const name=document.getElementById('f-name').value.trim();
    const cat=document.getElementById('f-cat').value;
    const origCurrency=document.getElementById('f-currency').value;
    const origValue=parseFloat(document.getElementById('f-value').value.replace(/,/g,''))||0;
    const isLiab=document.getElementById('f-liab').checked;
    // Convert to SGD for storage
    let valueSGD=origValue;
    if(origCurrency==='THB') valueSGD=Math.round(origValue*thbSgdRate);
    else if(origCurrency==='USD') valueSGD=Math.round(origValue*usdSgdRate);
    else if(origCurrency==='EUR') valueSGD=Math.round(origValue*eurSgdRate);
    if(!name){ document.getElementById('f-name').focus(); return; }
    if(editAssetId){
      assets=assets.map(a=>a.id===editAssetId?{...a,name,category:cat,value:valueSGD,isLiability:isLiab,origCurrency,origValue}:a);
    } else {
      assets.push({id:uid(),name,category:cat,value:valueSGD,isLiability:isLiab,origCurrency,origValue});
    }
    closeModal(); saveAll(); render();
  }
}

// CHARTS
// ════════════════════════════════════════════════════════════════════
function buildTrendChart(snaps, chartId='trendChart'){
  if(!snaps.length) return '<p class="empty">No snapshots yet. Record your first to start tracking.</p>';
  const W=580,H=190,PL=64,PR=30,PT=14,PB=40;
  const gW=W-PL-PR,gH=H-PT-PB;
  const navV=snaps.map(s=>s.nav),totV=snaps.map(s=>s.totalAssets);
  const {nestEgg} = computeGoal();
  const minV=Math.min(0,...navV),maxV=Math.max(nestEgg,...totV);
  const rng=maxV-minV||1;
  const tx=i=>PL+(snaps.length===1?gW/2:(i/(snaps.length-1))*gW);
  const ty=v=>PT+gH-((v-minV)/rng)*gH;
  const npts=snaps.map((s,i)=>`${tx(i).toFixed(1)},${ty(s.nav).toFixed(1)}`).join('L');
  const tpts=snaps.map((s,i)=>`${tx(i).toFixed(1)},${ty(s.totalAssets).toFixed(1)}`).join('L');
  const goalY=ty(nestEgg).toFixed(1);
  const ticks=[0,.25,.5,.75,1].map(t=>minV+t*rng);

  let grid='',yl='';
  ticks.forEach(v=>{
    const y=ty(v).toFixed(1);
    grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
    yl+=`<text x="${PL-6}" y="${(+y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text3)">${fmtK(v)}</text>`;
  });

  const maxLabels=Math.max(1,Math.floor(gW/58));
  const step=snaps.length<=maxLabels?1:Math.ceil(snaps.length/maxLabels);
  let xl='';
  snaps.forEach((s,i)=>{
    if(i!==0&&i!==snaps.length-1&&i%step!==0) return;
    xl+=`<text x="${tx(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="9" fill="var(--text3)">${s.date}</text>`;
  });

  let dots='';
  snaps.forEach((s,i)=>{
    dots+=`<circle cx="${tx(i).toFixed(1)}" cy="${ty(s.nav).toFixed(1)}" r="4" fill="var(--blue)" pointer-events="none"/>`;
    dots+=`<circle cx="${tx(i).toFixed(1)}" cy="${ty(s.totalAssets).toFixed(1)}" r="3" fill="var(--green)" pointer-events="none"/>`;
    const midY=((ty(s.nav)+ty(s.totalAssets))/2).toFixed(1);
    dots+=`<circle cx="${tx(i).toFixed(1)}" cy="${midY}" r="18" fill="transparent" style="cursor:pointer"
      onmouseenter="showChartTip('${chartId}',${i},this)"
      onmouseleave="scheduleHideTip('${chartId}')"
      onclick="toggleSnapDetail('${chartId}',${i})"/>`;
  });

  return `
  <div style="display:flex;flex-wrap:wrap;gap:7px 13px;margin-bottom:9px;font-size:12px;color:var(--text2)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:2px;background:var(--blue);display:inline-block"></span>Net worth</span>
    <span style="display:flex;align-items:center;gap:5px"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="var(--green)" stroke-width="2" stroke-dasharray="4 2"/></svg>Total assets</span>
    <span style="display:flex;align-items:center;gap:5px"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3 3"/></svg>${fmtK(nestEgg)} goal</span>
    <span style="color:var(--text3);margin-left:4px">· hover or click dots for details</span>
  </div>
  <div style="position:relative">
    <div id="${chartId}-tip"
      style="display:none;position:absolute;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:170px;pointer-events:auto;"
      onmouseenter="cancelHideTip('${chartId}')"
      onmouseleave="scheduleHideTip('${chartId}')"></div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" id="${chartId}-svg">
      ${grid}${yl}
      <line x1="${PL}" y1="${goalY}" x2="${W-PR}" y2="${goalY}" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4 3"/>
      ${snaps.length>1?`<path d="M${tpts}" fill="none" stroke="var(--green)" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round"/>`:''}
      ${snaps.length>1?`<path d="M${npts}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linejoin="round"/>`:''}
      ${dots}${xl}
    </svg>
  </div>
  <div id="${chartId}-detail" style="display:none;margin-top:10px;border-top:0.5px solid var(--border);padding-top:10px;"></div>`;
}

// ── Projection chart — separate from history, 10-year x-axis ──────────
function buildProjectionChart(){
  const {nestEgg, retireYear} = computeGoal();
  const r = goalSettings.annualReturn / 100;
  const latestNav = snapshots.length ? snapshots[snapshots.length-1].nav : 0;
  const monthlySavings = computeMonthlySavingsNeeded(latestNav);

  const W=580, H=180, PL=64, PR=30, PT=14, PB=36;
  const gW=W-PL-PR, gH=H-PT-PB;

  // Build yearly projection points from today to retireYear
  const yearsLeft = goalSettings.yearsToRetire;
  const monthsLeft = yearsLeft * 12;
  const steps = yearsLeft; // one point per year

  // Two-stream model: investable at portfolio rate, locked at own rates
  const s = computeAssetStreams();
  const ri = r;
  const projPoints=[], reqPoints=[];

  for(let i=0; i<=steps; i++){
    const yrs = (i/steps)*yearsLeft;
    const months = yrs * 12;
    const gfi = Math.pow(1+ri/12, months);
    // Investable: grows at portfolio rate + monthly savings
    const invProj = s.investable*gfi + (ri>0.0001 ? monthlySavings*(gfi-1)/(ri/12) : monthlySavings*months);
    // Locked assets grow at their own conservative rates
    const cpfP = s.cpf    * Math.pow(1.03,  yrs);
    const psgP = s.propSG * Math.pow(1.02,  yrs);
    const pthP = s.propTH * Math.pow(1.015, yrs);
    const insP = s.insur  * Math.pow(1.015, yrs);
    const projNav = invProj + cpfP + psgP + pthP + insP - s.liab;
    // Required: PV of nestEgg discounted from retire date at investable return rate
    const remainMonths = monthsLeft - months;
    const reqNav = nestEgg / Math.pow(1+ri/12, remainMonths);
    projPoints.push({x:i, y:projNav});
    reqPoints.push({x:i, y:reqNav});
  }

  const allY=[...projPoints.map(p=>p.y),...reqPoints.map(p=>p.y),nestEgg,latestNav,0];
  const minV=Math.min(0,...allY);
  const maxV=Math.max(...allY);
  const rng=maxV-minV||1;

  const tx=i=>PL+(i/steps)*gW;
  const ty=v=>PT+gH-((v-minV)/rng)*gH;

  // Grid + Y labels
  let grid='',yl='';
  [0,.25,.5,.75,1].forEach(t=>{
    const v=minV+t*rng, y=ty(v).toFixed(1);
    grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
    yl+=`<text x="${PL-6}" y="${(+y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text3)">${fmtK(v)}</text>`;
  });

  // X labels: yearly
  let xl='';
  const CURRENT_YEAR2 = new Date().getFullYear();
  for(let i=0; i<=steps; i++){
    if(steps<=10 || i%2===0 || i===steps){
      xl+=`<text x="${tx(i).toFixed(1)}" y="${H-PB+14}" text-anchor="middle" font-size="9" fill="var(--text3)">${CURRENT_YEAR2+i}</text>`;
    }
  }

  // Paths
  const projPath=projPoints.map(p=>`${tx(p.x).toFixed(1)},${ty(p.y).toFixed(1)}`).join('L');
  const reqPath =reqPoints.map(p=>`${tx(p.x).toFixed(1)},${ty(p.y).toFixed(1)}`).join('L');
  const goalY=ty(nestEgg).toFixed(1);

  // "Today" dot (leftmost point = current nav)
  const todayNav = computeTotals().nav;
  const todayX=tx(0).toFixed(1), todayY=ty(todayNav).toFixed(1);

  // Ahead/behind at year 0 (now)
  const reqNow=reqPoints[0].y;
  const ahead=todayNav>=reqNow;
  const statusText=ahead
    ? `▲ Ahead of required pace`
    : `▼ Behind required pace by ${fmtK(reqNow-todayNav)}`;
  const statusCol=ahead?'var(--green)':'var(--red)';

  // Shaded area between proj and req curves
  const fillPts=[...projPoints.map(p=>`${tx(p.x).toFixed(1)},${ty(p.y).toFixed(1)}`),
                 ...[...reqPoints].reverse().map(p=>`${tx(p.x).toFixed(1)},${ty(p.y).toFixed(1)}`)]
    .join('L');
  const fillCol=ahead?'rgba(29,158,117,0.07)':'rgba(226,75,74,0.07)';

  return `
  <div style="display:flex;flex-wrap:wrap;gap:7px 13px;margin-bottom:6px;font-size:12px;color:var(--text2)">
    <span style="display:flex;align-items:center;gap:5px"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="#1baf7a" stroke-width="2" stroke-dasharray="6 2"/></svg>Projected growth</span>
    <span style="display:flex;align-items:center;gap:5px"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="var(--amber)" stroke-width="2" stroke-dasharray="3 2"/></svg>Required pace</span>
    <span style="display:flex;align-items:center;gap:5px"><svg width="16" height="8"><line x1="0" y1="4" x2="16" y2="4" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="3 3"/></svg>${fmtK(nestEgg)} goal</span>
    <span style="margin-left:auto;font-size:11px;color:${statusCol};font-weight:500">${statusText}</span>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:8px">
    Investable assets (${fmtK(s.investable)}) grow at ${goalSettings.annualReturn}% · CPF at 3% · Property at 2% · Monthly savings ${fmtK(monthlySavings)} added to investable
  </div>
  <div style="position:relative">
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
      ${grid}${yl}
      <!-- Goal line -->
      <line x1="${PL}" y1="${goalY}" x2="${W-PR}" y2="${goalY}" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4 3"/>
      <!-- Shaded gap between proj and required -->
      <path d="M${fillPts}Z" fill="${fillCol}"/>
      <!-- Required pace -->
      <path d="M${reqPath}" fill="none" stroke="var(--amber)" stroke-width="2" stroke-dasharray="3 2" stroke-linejoin="round"/>
      <!-- Projected growth -->
      <path d="M${projPath}" fill="none" stroke="#1baf7a" stroke-width="2" stroke-dasharray="6 2" stroke-linejoin="round"/>
      <!-- Today marker -->
      <circle cx="${todayX}" cy="${todayY}" r="5" fill="var(--blue)" stroke="var(--bg)" stroke-width="2"/>
      <text x="${(+todayX+8).toFixed(1)}" y="${(+todayY+4).toFixed(1)}" font-size="9" fill="var(--blue)">Today ${fmtK(todayNav)}</text>
      <!-- Retire year marker -->
      <circle cx="${tx(steps).toFixed(1)}" cy="${ty(nestEgg).toFixed(1)}" r="4" fill="var(--red)" stroke="var(--bg)" stroke-width="2"/>
      ${xl}
    </svg>
  </div>`;
}

// Tip hide timer — delayed so cursor can move from dot to tooltip
const _tipTimers={};
function scheduleHideTip(chartId){
  _tipTimers[chartId]=setTimeout(()=>{
    const t=document.getElementById(chartId+'-tip');
    if(t) t.style.display='none';
  },300);
}
function cancelHideTip(chartId){
  clearTimeout(_tipTimers[chartId]);
}

function showChartTip(chartId, idx, dotEl){
  cancelHideTip(chartId);
  const s=snapshots[idx]; if(!s) return;
  const tip=document.getElementById(chartId+'-tip'); if(!tip) return;

  tip.innerHTML=buildSnapSummaryHtml(s, idx, false);
  tip.style.display='block';

  // Position relative to SVG container
  const svg=document.getElementById(chartId+'-svg');
  if(!svg) return;
  const svgRect=svg.getBoundingClientRect();
  const dotRect=dotEl.getBoundingClientRect();
  const wrap=svg.parentElement;
  const wrapRect=wrap.getBoundingClientRect();

  // Dot position relative to wrap
  const dotX=dotRect.left+dotRect.width/2-wrapRect.left;
  const dotY=dotRect.top-wrapRect.top;

  // Place tooltip above the dot; flip below if not enough space
  const tipW=190, tipH=tip.offsetHeight||120;
  let left=dotX-tipW/2;
  let top=dotY-tipH-10;
  if(top<0) top=dotY+30;
  if(left<0) left=0;
  if(left+tipW>wrapRect.width) left=wrapRect.width-tipW;
  tip.style.left=left+'px';
  tip.style.top=top+'px';
}

function toggleSnapDetail(chartId, idx){
  const panel=document.getElementById(chartId+'-detail'); if(!panel) return;
  const tip=document.getElementById(chartId+'-tip'); if(tip) tip.style.display='none';
  const s=snapshots[idx]; if(!s) return;

  // If already showing same snapshot, collapse
  if(panel.dataset.idx===String(idx)&&panel.style.display!=='none'){
    panel.style.display='none'; panel.dataset.idx='';
    return;
  }
  panel.dataset.idx=String(idx);
  panel.innerHTML=buildSnapDetailHtml(s, idx);
  panel.style.display='block';
}

async function fetchLiveFxRate(){
  const btn=event.target;
  btn.disabled=true; btn.textContent='↻ Fetching…';
  try{
    const pairs=[
      {ticker:'USDSGD=X',exchange:'US',companyName:'USD/SGD',currency:'USD'},
      {ticker:'EURSGD=X',exchange:'US',companyName:'EUR/SGD',currency:'USD'},
      {ticker:'THBSGD=X',exchange:'US',companyName:'THB/SGD',currency:'USD'},
    ];
    const results=await Promise.allSettled(pairs.map(st=>fetchQuote(st)));
    if(results[0].status==='fulfilled'&&results[0].value.price>0) usdSgdRate=Math.round(results[0].value.price*10000)/10000;
    if(results[1].status==='fulfilled'&&results[1].value.price>0) eurSgdRate=Math.round(results[1].value.price*10000)/10000;
    if(results[2].status==='fulfilled'&&results[2].value.price>0) thbSgdRate=Math.round(results[2].value.price*100000)/100000;
    saveAll(); render();
  }catch(e){ alert('Could not fetch live rates. Please enter manually.'); }
}

// Naive version (total nav × one rate) — used only for comparison label
function computeMonthlySavingsNeededNaive(nav){
  const {nestEgg}=computeGoal(); const r=goalSettings.annualReturn/100; const n=goalSettings.yearsToRetire;
  const gf=Math.pow(1+r,n); const gap=Math.max(0,nestEgg-nav*gf); if(gap<=0) return 0;
  return gap*(r/12)/(gf-1);
}

// Sort state per exchange — persists while portfolio tab is open
const _sortState = { US: {col:'ticker', dir:1}, SG: {col:'ticker', dir:1}, TH: {col:'ticker', dir:1} };

function sortStocks(exchange, col){
  const s = _sortState[exchange];
  if(s.col === col) s.dir *= -1;
  else { s.col = col; s.dir = 1; }
  renderPortfolio();
}

// Dividend tab sort state
// Per-market sort state for Dividends tab (independent per table)
let _divSort = {
  US: { col: 'annualNet', dir: -1 },
  SG: { col: 'annualNet', dir: -1 },
  TH: { col: 'annualNet', dir: -1 },
};

function sortDividendMarket(market, col){
  const s = _divSort[market];
  if(!s) return;
  if(s.col === col) s.dir *= -1;
  else { s.col = col; s.dir = (col==='ticker'||col==='name') ? 1 : -1; }
  renderDividends();
}

// Keep sortDividends as alias for backward compat (not used in new layout)
function sortDividends(col){ sortDividendMarket('US', col); }

function renderPortfolio(){
  const usStocks=stocks.filter(s=>s.exchange==='US');
  const sgStocks=stocks.filter(s=>s.exchange==='SG');
  const thStocks=stocks.filter(s=>s.exchange==='TH');
  const lastUpdated=stocks.filter(s=>s.lastUpdated).map(s=>s.lastUpdated).sort().pop();

  function sortList(list, exchange){
    const {col, dir} = _sortState[exchange];
    return [...list].sort((a,b)=>{
      let av, bv;
      if(col==='ticker')   { av=a.ticker;              bv=b.ticker; }
      else if(col==='name'){ av=a.companyName||'';     bv=b.companyName||''; }
      else if(col==='units'){ av=a.units||0;           bv=b.units||0; }
      else if(col==='price'){ av=a.lastPrice||0;       bv=b.lastPrice||0; }
      else if(col==='value'){ av=getStockValueSGD(a)||0; bv=getStockValueSGD(b)||0; }
      else if(col==='chg') { av=a.lastChange??-999;    bv=b.lastChange??-999; }
      if(typeof av==='string') return dir * av.localeCompare(bv);
      return dir * (av - bv);
    });
  }

  function thBtn(exchange, col, label, align='left'){
    const {col:active, dir} = _sortState[exchange];
    const isActive = active===col;
    const arrow = isActive ? (dir===1 ? ' ↑' : ' ↓') : '';
    return `<th style="cursor:pointer;user-select:none;white-space:nowrap;text-align:${align}"
      onclick="sortStocks('${exchange}','${col}')"
      title="Sort by ${label}">
      <span style="color:${isActive?'var(--blue)':'var(--text3)'};font-weight:${isActive?'600':'500'}">${label}${arrow}</span>
    </th>`;
  }

  function buildTable(list, exchange){
    if(!list.length) return '<p class="empty">No positions. Click + Add to add stocks.</p>';
    const sorted = sortList(list, exchange);
    let totalVal=0;
    const rows=sorted.map(st=>{
      const valSGD=getStockValueSGD(st);
      if(valSGD) totalVal+=valSGD;
      const divNote = getDivInfo(st).note;
      const suspendedBadge = divNote ? `<span style="font-size:10px;background:#FCEBEB;color:#791F1F;padding:1px 6px;border-radius:10px;margin-left:6px">Suspended</span>` : '';
      const priceCell=st.lastPrice
        ?`<span class="price-cell">${fmtPrice(st.lastPrice,st.currency)}</span>${st.lastChange!=null?`<span class="${st.lastChange>=0?'change-pos':'change-neg'}" style="font-size:11px;margin-left:4px">${st.lastChange>=0?'+':''}${st.lastChange.toFixed(1)}%</span>`:''} ${st.priceSource?`<span style="font-size:9px;color:var(--text3);margin-left:3px">${st.priceSource}</span>`:''}`
        :`<span class="price-stale">–</span>`;
      const valCell=valSGD?`<span class="value-cell">${fmtK(valSGD)}</span>`:`<span class="price-stale">–</span>`;
      return `<tr>
        <td class="ticker-cell">${st.ticker}</td>
        <td class="company-cell hide-mobile">${st.companyName}${suspendedBadge}</td>
        <td class="num">${st.units.toLocaleString()}</td>
        <td class="num">${priceCell}</td>
        <td class="num">${valCell}</td>
        <td class="num"><button class="btn btn-sm" onclick="openEditStock('${st.id}')" style="padding:3px 8px;font-size:11px">Edit</button></td>
      </tr>`;
    }).join('');
    return `
      <div class="portfolio-summary">
        <span class="port-stat">Positions: <strong>${list.length}</strong></span>
        <span class="port-stat">Total value: <strong>${fmtK(totalVal)}</strong></span>
        ${lastUpdated?`<span class="port-stat">Updated: <strong>${tsAgo(lastUpdated)}</strong></span>`:''}
      </div>
      <div style="overflow-x:auto">
      <table class="stock-table">
        <thead><tr>
          ${thBtn(exchange,'ticker','Ticker')}
          ${thBtn(exchange,'name','Company')}
          ${thBtn(exchange,'units','Units','right')}
          ${thBtn(exchange,'price','Price','right')}
          ${thBtn(exchange,'value','Value (SGD)','right')}
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  }

  document.getElementById('view-portfolio').innerHTML=`
    <div class="section-hdr">
      <span class="section-dot" style="background:var(--blue)"></span>
      <span class="section-label">🇺🇸 US Portfolio</span>
    </div>
    <div class="card">${buildTable(usStocks,'US')}</div>
    <div class="section-hdr"><span class="section-dot" style="background:var(--green)"></span><span class="section-label">🇸🇬 SGX Portfolio (SGD)</span></div>
    <div class="card">${buildTable(sgStocks,'SG')}</div>
    ${thStocks.length>0?`<div class="section-hdr"><span class="section-dot" style="background:var(--amber)"></span><span class="section-label">🇹🇭 SET Thailand Portfolio (THB) <span style="font-size:11px;color:var(--text3);font-weight:400">· −10% WHT on dividends</span></span></div>
    <div class="card">${buildTable(thStocks,'TH')}</div>`:''}
    <button class="btn btn-block" onclick="openAddModal()">+ Add stock position</button>`;
}

function renderAssets(){
  let html='';
  const CUR_SYM={'SGD':'S$','THB':'฿','USD':'US$'};
  CATEGORIES.forEach(cat=>{
    const catA=assets.filter(a=>a.category===cat);
    if(!catA.length) return;
    const tot=catA.filter(a=>!a.isLiability).reduce((s,a)=>s+getAssetValueSGD(a),0);
    const liab=catA.filter(a=>a.isLiability).reduce((s,a)=>s+getAssetValueSGD(a),0);
    const summary=liab>0?`Assets ${fmtK(tot)} · Liab ${fmtK(liab)}`:fmtK(tot);
    html+=`<div class="section-hdr"><span class="section-dot" style="background:${CAT_COLOR[cat]||'#888'}"></span><span class="section-label">${cat}</span><span class="section-total">${summary}</span></div>`;
    catA.forEach(a=>{
      const sgdVal=getAssetValueSGD(a);
      const cur=a.origCurrency||'SGD';
      const sym=CUR_SYM[cur]||cur+' ';
      const origStr=cur!=='SGD'&&a.origValue!=null
        ?`<span style="font-size:11px;color:var(--text3);margin-left:6px">${sym}${Math.round(a.origValue).toLocaleString()}</span>`:'';
      html+=`<div class="asset-row">
        <div style="flex:1">
          <div class="asset-name">${a.name}${cur!=='SGD'?`<span style="font-size:10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:4px;padding:1px 5px;margin-left:6px;color:var(--text3)">${cur}</span>`:''}</div>
          ${a.isLiability?'<span class="liab-badge">Liability</span>':''}
        </div>
        <div style="text-align:right">
          <div class="asset-value" style="color:${a.isLiability?'var(--red)':'var(--text)'}">${a.isLiability?'−':''}${fmtK(sgdVal)}</div>
          ${origStr}
        </div>
        <button class="btn btn-sm" onclick="openEditAsset('${a.id}')">✏️</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAsset('${a.id}')">🗑</button>
      </div>`;
    });
  });
  html+=`<button class="btn btn-block" onclick="openAddModal();setModalType('asset')">+ Add asset / liability</button>`;
  document.getElementById('view-assets').innerHTML=html;
}

// EXPORT / IMPORT
// ════════════════════════════════════════════════════════════════════
function exportData(){
  const data=JSON.stringify({stocks,assets,snapshots,exportedAt:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='finance-backup-'+todayStr()+'.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.stocks) stocks=d.stocks;
        if(d.assets) assets=d.assets;
        if(d.snapshots) snapshots=d.snapshots;
        saveAll(); render();
        alert('Data imported successfully.');
      }catch{ alert('Invalid file.'); }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function syncMissingAndRefresh(){
  if(stocks.length === 0){
    stocks = SEED_STOCKS.map(s=>({...s, id:uid()}));
    saveAll(); render();
    alert('Sample stocks restored. Replace them with your own holdings.');
  } else {
    alert('Your portfolio already has stocks. Use + Add to add more, or ↺ Reset stock list to start fresh.');
  }
}

function resetStocksOnly(){
  if(!confirm('This will reset your stock list to the default positions.\n\nYour units, snapshots, and other assets will NOT be affected.\n\nContinue?')) return;
  stocks=SEED_STOCKS.map(s=>({...s,id:uid()}));
  saveAll(); render();
  alert('Stock list reset. Click "↻ Refresh prices" to load prices.');
}
function render(){
  if(currentTab==='dashboard') renderDashboard();
  else if(currentTab==='portfolio') renderPortfolio();
  else if(currentTab==='dividends') renderDividends();
  else if(currentTab==='insights') renderInsights();
  else if(currentTab==='assets') renderAssets();
  else if(currentTab==='history') renderHistory();
}

function getDivInfo(st){
  if(st.divPerShare != null) return { dps: st.divPerShare, freq: st.divFreq||'annual', note: st.divNote||null };
  const d = DIVIDEND_DEFAULTS[st.ticker] || { dps: 0, freq: 'none' };
  return { dps: d.dps, freq: d.freq, note: d.note||null };
}

function getDivSGD(st){
  const {dps} = getDivInfo(st);
  if(!dps) return 0;
  if(st.exchange==='US'){
    if(st.currency==='EUR') return dps * eurSgdRate;
    return dps * usdSgdRate;
  }
  if(st.exchange==='TH' || st.currency==='THB') return dps * thbSgdRate;
  return dps; // SGX already in SGD
}

function renderDividends(){
  const GOAL_MONTHLY = 10000;
  const US_WHT = 0.30;  // 30% US withholding tax — no SG-US tax treaty
  const SG_WHT = 0.00;  // Singapore dividends: zero withholding for SG residents
  const TH_WHT = 0.10;  // 10% Thailand withholding tax — flat rate for all investors
  const FREQ_LABEL = { 'quarterly':'Quarterly','semi-annual':'Semi-annual','annual':'Annual','monthly':'Monthly','none':'None' };

  // Build rows — each row carries both gross and net figures
  const rows = stocks.map(st=>{
    const {dps, freq, note} = getDivInfo(st);
    const isUS = st.exchange==='US';
    const isTH = st.exchange==='TH';
    const wht  = isUS ? US_WHT : isTH ? TH_WHT : SG_WHT;
    const divSGD      = getDivSGD(st);                    // gross per unit in SGD
    const divSGDNet   = divSGD * (1 - wht);               // after withholding
    const annualGross = divSGD * st.units;
    const annualNet   = divSGDNet * st.units;
    const taxDrag     = annualGross - annualNet;
    const monthlyNet  = annualNet / 12;
    const yieldPct    = st.lastPrice ? (dps / st.lastPrice * 100) : null;
    const yieldNetPct = yieldPct != null ? yieldPct * (1 - wht) : null;
    return { st, dps, freq, note, wht, isUS, isTH, divSGD, divSGDNet, annualGross, annualNet, taxDrag, monthlyNet, yieldPct, yieldNetPct };
  });

  const totalGross   = rows.reduce((s,r)=>s+r.annualGross, 0);
  const totalNet     = rows.reduce((s,r)=>s+r.annualNet,   0);
  const totalTaxDrag = totalGross - totalNet;
  const totalMonthly = totalNet / 12;
  const goalPct      = Math.min(100, Math.round(totalMonthly / GOAL_MONTHLY * 100));

  // US vs SG vs TH breakdown
  const usGross = rows.filter(r=>r.isUS).reduce((s,r)=>s+r.annualGross,0);
  const usNet   = rows.filter(r=>r.isUS).reduce((s,r)=>s+r.annualNet,0);
  const sgNet   = rows.filter(r=>!r.isUS&&!r.isTH).reduce((s,r)=>s+r.annualNet,0);
  const thGross = rows.filter(r=>r.isTH).reduce((s,r)=>s+r.annualGross,0);
  const thNet   = rows.filter(r=>r.isTH).reduce((s,r)=>s+r.annualNet,0);

  const paying    = rows.filter(r=>r.annualGross>0).sort((a,b)=>b.annualNet-a.annualNet);
  const suspended = rows.filter(r=>r.annualGross===0 && r.note);
  const noPay     = rows.filter(r=>r.annualGross===0 && !r.note);

  function tableRow(r){
    const {st,dps,freq,isUS,isTH,wht,annualGross,annualNet,taxDrag,monthlyNet,yieldPct,yieldNetPct} = r;
    const cur = isUS ? 'US$' : isTH ? '฿' : 'S$';
    const dpsStr     = dps>0 ? `${cur}${dps.toFixed(2)}` : '—';
    const whtBadge   = isUS
      ? `<span style="font-size:9px;background:rgba(226,75,74,.12);color:var(--red);border-radius:3px;padding:1px 4px;margin-left:4px">-30% WHT</span>`
      : isTH
      ? `<span style="font-size:9px;background:rgba(186,117,23,.12);color:var(--amber);border-radius:3px;padding:1px 4px;margin-left:4px">-10% WHT</span>`
      : `<span style="font-size:9px;background:rgba(29,158,117,.12);color:var(--green);border-radius:3px;padding:1px 4px;margin-left:4px">Tax-free</span>`;
    const yieldStr   = yieldNetPct!=null && dps>0 ? `${yieldNetPct.toFixed(1)}%` : '—';
    const taxStr     = taxDrag>0 ? `<span style="color:var(--red);font-size:11px">−${fmtK(taxDrag)}</span>` : '—';
    return `<tr>
      <td style="font-family:monospace;font-size:12px;font-weight:600;color:var(--blue)">${st.ticker}${whtBadge}</td>
      <td style="font-size:12px;color:var(--text2)" class="hide-mobile">${st.companyName}</td>
      <td style="text-align:right;font-size:12px">${st.units.toLocaleString()}</td>
      <td style="text-align:right;font-size:12px">${dpsStr}</td>
      <td style="text-align:right;font-size:12px;color:var(--text2)">${FREQ_LABEL[freq]||freq}</td>
      <td style="text-align:right;font-size:12px;color:${(yieldNetPct||0)>5?'var(--green)':(yieldNetPct||0)>2?'var(--blue)':'var(--text2)'}">${yieldStr}</td>
      <td style="text-align:right;font-size:12px;color:var(--text3)">${annualGross>0?fmtK(annualGross):'—'}</td>
      <td style="text-align:right;font-size:11px">${taxStr}</td>
      <td style="text-align:right;font-weight:600;font-size:13px;color:var(--green)">${annualNet>0?fmtK(annualNet):'—'}</td>
      <td style="text-align:right;font-size:12px;color:var(--text2)">${monthlyNet>0?fmtK(monthlyNet):''}</td>
      <td style="text-align:right">
        <button class="btn btn-sm" onclick="openDivEdit('${st.id}')" style="padding:3px 8px;font-size:11px">Edit</button>
      </td>
    </tr>`;
  }


  // ── Per-market sort state (independent per table) ─────────────────
  function sortedRows(list, market){
    const s = _divSort[market] || {col:'annualNet', dir:-1};
    return [...list].sort((a,b)=>{
      let av, bv;
      if     (s.col==='ticker')    { av=a.st.ticker;          bv=b.st.ticker; }
      else if(s.col==='name')      { av=a.st.companyName||''; bv=b.st.companyName||''; }
      else if(s.col==='units')     { av=a.st.units;           bv=b.st.units; }
      else if(s.col==='dps')       { av=a.dps;                bv=b.dps; }
      else if(s.col==='yieldNet')  { av=a.yieldNetPct||0;     bv=b.yieldNetPct||0; }
      else if(s.col==='gross')     { av=a.annualGross;         bv=b.annualGross; }
      else if(s.col==='tax')       { av=a.taxDrag;             bv=b.taxDrag; }
      else if(s.col==='annualNet') { av=a.annualNet;           bv=b.annualNet; }
      else if(s.col==='monthlyNet'){ av=a.monthlyNet;          bv=b.monthlyNet; }
      if(typeof av==='string') return s.dir * av.localeCompare(bv);
      return s.dir * ((av||0) - (bv||0));
    });
  }

  function mTh(market, col, label, align='right'){
    const s = _divSort[market] || {col:'annualNet', dir:-1};
    const active = s.col===col;
    const arrow  = active ? (s.dir===1 ? ' ↑' : ' ↓') : '';
    return `<th style="cursor:pointer;user-select:none;white-space:nowrap;text-align:${align}"
      onclick="sortDividendMarket('${market}','${col}')" title="Sort by ${label}">
      <span style="color:${active?'var(--blue)':'var(--text3)'};font-weight:${active?'600':'500'}">${label}${arrow}</span>
    </th>`;
  }

  function marketTable(list, market, accentColor, gross, tax, net){
    if(!list.length) return '<p class="empty" style="font-size:12px;padding:8px 0">No dividend-paying positions in this market yet.</p>';
    const FREQ_LBL = {'quarterly':'Quarterly','semi-annual':'Semi-annual','annual':'Annual','monthly':'Monthly','none':'None'};
    const sorted = sortedRows(list, market);
    const tRows = sorted.map(r=>{
      const {st,dps,freq,annualGross,annualNet,taxDrag,monthlyNet,yieldNetPct}=r;

      const yldCol=(yieldNetPct||0)>5?'var(--green)':(yieldNetPct||0)>2?'var(--blue)':'var(--text2)';
      const taxStr=taxDrag>0?`<span style="color:var(--red);font-size:11px">−${fmtK(taxDrag)}</span>`:'—';
      return `<tr>
        <td style="font-family:monospace;font-size:12px;font-weight:600;color:${accentColor}">${st.ticker}</td>
        <td style="font-size:12px;color:var(--text2)" class="hide-mobile">${st.companyName}</td>
        <td style="text-align:right;font-size:12px">${st.units.toLocaleString()}</td>
        <td style="text-align:right;font-size:12px">${dpsStr}</td>
        <td style="text-align:right;font-size:12px;color:var(--text2)">${FREQ_LBL[freq]||freq}</td>
        <td style="text-align:right;font-size:12px;color:${yldCol}">${yldStr}</td>
        <td style="text-align:right;font-size:12px;color:var(--text3)">${annualGross>0?fmtK(annualGross):'—'}</td>
        <td style="text-align:right;font-size:11px">${taxStr}</td>
        <td style="text-align:right;font-weight:600;font-size:13px;color:var(--green)">${annualNet>0?fmtK(annualNet):'—'}</td>
        <td style="text-align:right;font-size:12px;color:var(--text2)">${monthlyNet>0?fmtK(monthlyNet):''}</td>
        <td style="text-align:right"><button class="btn btn-sm" onclick="openDivEdit('${st.id}')" style="padding:3px 8px;font-size:11px">Edit</button></td>
      </tr>`;
    }).join('');
    const totRow=`<tr style="border-top:1.5px solid var(--border)">
      <td colspan="2" style="font-weight:600;font-size:13px;padding:8px">Total</td>
      <td></td><td></td><td></td><td></td>
      <td style="text-align:right;font-size:12px;color:var(--text3)">${fmtK(gross)}</td>
      <td style="text-align:right;font-size:12px;color:var(--red)">−${fmtK(tax)}</td>
      <td style="text-align:right;font-weight:700;font-size:14px;color:var(--green)">${fmtK(net)}</td>
      <td style="text-align:right;font-weight:600;font-size:13px;color:var(--green)">${fmtK(net/12)}</td>
      <td></td>
    </tr>`;
    const nameTh=`<th class="hide-mobile" style="cursor:pointer;user-select:none" onclick="sortDividendMarket('${market}','name')">
      <span style="color:${(_divSort[market]||{}).col==='name'?'var(--blue)':'var(--text3)'};font-weight:${(_divSort[market]||{}).col==='name'?'600':'500'}">Company${(_divSort[market]||{}).col==='name'?((_divSort[market].dir===1?' ↑':' ↓')):''}  </span></th>`;
    return `<div style="overflow-x:auto">
    <table class="stock-table">
      <thead><tr>
        ${mTh(market,'ticker','Ticker','left')}${nameTh}
        ${mTh(market,'units','Units')}${mTh(market,'dps','DPS')}
        <th style="text-align:right;color:var(--text3);white-space:nowrap">Frequency</th>
        ${mTh(market,'yieldNet','Net yield')}${mTh(market,'gross','Gross (SGD)')}
        ${mTh(market,'tax','Tax withheld')}${mTh(market,'annualNet','Net (SGD)')}
        ${mTh(market,'monthlyNet','/mo net')}<th></th>
      </tr></thead>
      <tbody>${tRows}${totRow}</tbody>
    </table></div>`;
  }

  const usRows=paying.filter(r=>r.isUS);
  const sgRows=paying.filter(r=>!r.isUS&&!r.isTH);
  const thRows=paying.filter(r=>r.isTH);

  document.getElementById('view-dividends').innerHTML=`
    <div style="background:rgba(55,138,221,.07);border:0.5px solid rgba(55,138,221,.25);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text2);line-height:1.7">
      <strong style="color:var(--text)">🇸🇬 Singapore resident tax treatment:</strong>
      <span style="background:rgba(226,75,74,.12);color:var(--red);border-radius:3px;padding:1px 6px;margin:0 4px;font-weight:500">US stocks −30% WHT</span> deducted at source.
      <span style="background:rgba(186,117,23,.12);color:var(--amber);border-radius:3px;padding:1px 6px;margin:0 4px;font-weight:500">Thailand stocks −10% WHT</span> flat rate.
      <span style="background:rgba(29,158,117,.12);color:var(--green);border-radius:3px;padding:1px 6px;margin:0 4px;font-weight:500">SGX stocks 0% tax-free</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin-bottom:12px">
      <div class="metric"><div class="metric-label">Net annual income</div><div class="metric-value" style="color:var(--green)">${fmtK(totalNet)}</div><div class="metric-sub">after all withholding</div></div>

      <div class="metric"><div class="metric-label">Dividends cover goal</div><div class="metric-value" style="color:${goalPct>=100?'var(--green)':goalPct>=50?'var(--blue)':'var(--amber)'}">${goalPct}%</div><div class="metric-sub">${goalPct>=100?'🎉 Fully covered!':'S$'+Math.round(GOAL_MONTHLY-totalMonthly).toLocaleString()+'/mo gap'}</div></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">Income by market — gross vs net after withholding</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px">
        <div style="background:rgba(226,75,74,.06);border:0.5px solid rgba(226,75,74,.2);border-radius:var(--radius-sm);padding:10px 12px">
          <div style="font-size:11px;font-weight:500;color:var(--red);margin-bottom:6px">🇺🇸 US Portfolio (−30% WHT)</div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--text2)">Gross declared</span><span style="color:var(--text3)">${fmtK(usGross)}</span></div>
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--text2)">Withheld (30%)</span><span style="color:var(--red)">−${fmtK(usGross-usNet)}</span></div>
